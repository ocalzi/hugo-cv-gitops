apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cv-preview
  namespace: preview-hugo-cv-pr-{{ .Values.pr }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - pr-{{ .Values.pr }}-hugo-cv.preview.{{ .Values.domain }}
  rules:
    - backendRefs:
        - name: cv-preview
          port: 80
          weight: 1
