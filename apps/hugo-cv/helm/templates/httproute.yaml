{{- range .Values.personas }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cv-{{ .name }}
  namespace: default
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: https-cv-{{ .name }}
  hostnames:
    - {{ .domain }}
  rules:
    - backendRefs:
        - name: cv-service-{{ .name }}
          namespace: hugo-cv
          port: 80
          weight: 1
{{- end }}
