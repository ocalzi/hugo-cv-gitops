# Hugo CV — GitHub Actions CI pipeline (mirror of Gitea Actions workflow)
#
# Triggers:
#   - push to master → build, push, create Octopus release, deploy to production
#   - PR opened/updated → build, push preview image, create Octopus release (no deploy)
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   REGISTRY_USERNAME     — container registry username
#   REGISTRY_PASSWORD     — container registry password/token
#   OCTOPUS_URL           — e.g. https://octopus.YOUR_DOMAIN
#   OCTOPUS_API_KEY       — Octopus Deploy API key
#
# Difference from Gitea Actions:
#   - Uses docker/setup-buildx-action instead of in-cluster BuildKit
#   - Uses OctopusDeploy/install-octopus-cli-action for CLI installation
#   - Runs on GitHub-hosted runners (no self-hosted runner required)

name: Build and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: YOUR_REGISTRY
  IMAGE_NAME: YOUR_IMAGE
  OCTOPUS_PROJECT: Hugo-CV
  OCTOPUS_SPACE: Spaces-1

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-')
            TAG="${BRANCH}-${SHA}"
          else
            TAG="master-${SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  octopus-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3

      - name: Create Octopus release
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
        run: |
          octopus release create \
            --project "${{ env.OCTOPUS_PROJECT }}" \
            --space "${{ env.OCTOPUS_SPACE }}" \
            --version "${{ needs.build.outputs.sha }}" \
            --variable "ImageTag:${{ needs.build.outputs.image_tag }}"

      - name: Deploy to production (master only)
        if: github.ref == 'refs/heads/master'
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUS_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
        run: |
          octopus release deploy \
            --project "${{ env.OCTOPUS_PROJECT }}" \
            --space "${{ env.OCTOPUS_SPACE }}" \
            --version "${{ needs.build.outputs.sha }}" \
            --environment production
