# ClusterIssuers for Let's Encrypt via OVH DNS-01 webhook.
#
# Prerequisites:
#   1. cert-manager installed (Gateway API support is on by default in v1.15+):
#      helm install cert-manager jetstack/cert-manager \
#        --namespace cert-manager --create-namespace \
#        --set crds.enabled=true
#
#   2. cert-manager-webhook-ovh installed (credentials via secret, not Helm values):
#      helm install cert-manager-webhook-ovh cert-manager-webhook-ovh/cert-manager-webhook-ovh \
#        --namespace cert-manager \
#        --set groupName=acme.YOUR_DOMAIN
#
#   3. OVH credentials secret created (see secret-ovh-credentials.yaml.example)
#
#   4. RBAC for webhook to read the secret (required — chart does not create this):
#      kubectl create role cert-manager-webhook-ovh-secret-reader \
#        --namespace cert-manager --verb=get --resource=secrets \
#        --resource-name=letsencrypt-prod-dns01-ovh-credentials
#      kubectl create rolebinding cert-manager-webhook-ovh-secret-reader \
#        --namespace cert-manager \
#        --role=cert-manager-webhook-ovh-secret-reader \
#        --serviceaccount=cert-manager:cert-manager-webhook-ovh
#
# OVH API credentials: https://api.ovh.com/createApp/

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01
spec:
  acme:
    email: YOUR_EMAIL
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-account-key
    solvers:
      - dns01:
          cnameStrategy: None
          webhook:
            groupName: acme.YOUR_DOMAIN
            solverName: ovh
            config:
              endpoint: ovh-eu  # or ovh-ca, ovh-us — see https://api.ovh.com
              authenticationMethod: application
              applicationKeyRef:
                name: letsencrypt-prod-dns01-ovh-credentials
                key: applicationKey
              applicationSecretRef:
                name: letsencrypt-prod-dns01-ovh-credentials
                key: applicationSecret
              applicationConsumerKeyRef:
                name: letsencrypt-prod-dns01-ovh-credentials
                key: applicationConsumerKey
