# ReferenceGrant — allows HTTPRoutes in the default namespace to reference
# Services in the hugo-cv namespace.
# Required by Gateway API spec for all cross-namespace backend references.
# Without this, Cilium Gateway rejects the HTTPRoute with "RefNotPermitted".
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-to-hugo-cv
  namespace: hugo-cv
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: default
  to:
    - group: ""
      kind: Service
